name: webhook-service CI

on:
  push:
    branches: [main]
    paths:
      - 'services/webhook-service/**'
      - '.github/workflows/webhook-service-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/webhook-service/**'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/webhook-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and run tests
        run: ./gradlew build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-service-test-report
          path: services/webhook-service/build/reports/tests/test/
          retention-days: 14